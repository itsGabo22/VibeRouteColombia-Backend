# ===================================================================
# CONFIGURACIÓN DE BASE DE DATOS POSTGRESQL
# ===================================================================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/route_optimizer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# Dialecto de base de datos
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate DDL Auto
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# GOOGLE MAPS
# ===================================================================

google.maps.api.key=${GOOGLE_MAPS_KEY}

# ===================================================================
# GOOGLE GEMINI (IA)
# ===================================================================

gemini.api.key=${GOOGLE_GEMINI_KEY}
gemini.model=gemini-2.5-flash

# Logs de seguridad para debug
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# ===================================================================
# JWT SECURITY
# ===================================================================

# Set JWT_SECRET as an environment variable (docker-compose.yml locally, Render dashboard in production)
jwt.secret=${JWT_SECRET}

# FIREBASE STORAGE
firebase.storage.bucket=viberoute-colombia.appspot.com

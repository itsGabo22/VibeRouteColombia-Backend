services:
  viberoute-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: viberoute-backend
    ports:
      - "8080:8080"
    depends_on:
      - viberoute-db
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://viberoute-db:5432/route_optimizer
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=changeme
      - JAVA_OPTS=-Xmx3g -Xms1g
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - viberoute-net

  viberoute-db:
    image: postgis/postgis:15-3.3
    container_name: viberoute-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: route_optimizer
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: changeme
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/main/resources/data-zones.sql:/docker-entrypoint-initdb.d/10-zones.sql
    networks:
      - viberoute-net

networks:
  viberoute-net:
    driver: bridge

volumes:
  pgdata:
